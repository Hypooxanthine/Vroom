name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            xvfb

      - name: Configure CMake
        run: cmake --preset linux-debug

      - name: Build
        run: cmake --build build/linux-debug --target VroomTests --parallel

      - name: Run tests
        working-directory: ${{ github.workspace }}/build/linux-debug
        run: xvfb-run ctest --output-on-failure
